name: Update Card Data

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 6am UTC
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch card data
        run: |
          python3 << 'PYEOF'
          import urllib.request
          import json

          # Community-built Marvel Snap API (open, no auth required)
          url = "https://marvel-snap-bgaona.onrender.com/v1/cards/"
          req = urllib.request.Request(url, headers={"User-Agent": "Mozilla/5.0"})
          with urllib.request.urlopen(req, timeout=30) as r:
              raw = json.loads(r.read().decode())

          print(f"Fetched {len(raw)} cards")
          print(f"Sample: {raw[0]}")

          cards = []
          for c in raw:
              name = c.get("cname", "")
              cid  = c.get("cid", "")
              if not name or not cid:
                  continue
              cards.append({
                  "cardDefId": cid,
                  "name":      name,
                  "cost":      int(c.get("cost", 0) or 0),
                  "power":     int(c.get("power", 0) or 0),
                  "ability":   c.get("ability") or "",
                  "image":     c.get("art") or ""
              })

          cards.sort(key=lambda x: (x["cost"], x["name"]))

          with open("cards.json", "w") as f:
              json.dump(cards, f, indent=2)

          print(f"Wrote {len(cards)} cards to cards.json")
          PYEOF

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cards.json
          git diff --staged --quiet || git commit -m "chore: update card data [skip ci]"
          git push
