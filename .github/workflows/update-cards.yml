name: Update Card Data

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 6am UTC
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch card data
        run: |
          python3 << 'PYEOF'
          import urllib.request
          import json
          import time

          # Cards that are tokens (generated by other cards/locations, not in player collections)
          TOKEN_IDS = {
            # Korg
            "Rock",
            # Squirrel Girl
            "Squirrel",
            # Doctor Doom
            "DoomBot",
            # White Tiger
            "Tiger",
            # Thor
            "Mjolnir",
            # Black Widow
            "WidowsBite",
            # Thanos Infinity Stones
            "GemSoul", "GemMind", "GemPower", "GemReality", "GemSpace", "GemTime",
            "InfinityStone", "SoulStone", "MindStone", "PowerStone", "RealityStone", "SpaceStone", "TimeStone",
            # Hydra
            "HydraToken",
            # Wasp (generated)
            "WaspToken",
            # Sandman
            "SandToken",
            # Pirate tokens
            "Pirate",
            # Ant tokens
            "Ant",
            # Demon (Mephisto etc)
            "Demon",
            # Groot baby
            "BabyGroot",
            # Frog
            "Frog",
            # Dino
            "Devil_Dinosaur_Token",
            # Cats (Goose)
            "Flerken",
            # Venom/Carnage symbiote
            "Symbiote",
            # Legion copies
            "LegionCopy",
            # Shuri copy
            "ShuriToken",
            # Modok discard
            "ModokToken",
            # Arnim Zola copy
            "ArnimZolaCopy",
            # Patriot / Bestman
            "Patriot_Token",
            # Helicarrier
            "HelicarrierToken",
            # Jubilee pulls
            "JubileeToken",
            # Ultron drones
            "Drone",
            # Various
            "SentinelToken", "CableToken", "ForgeToken",
            # Hood demon
            "HoodDemon",
            # Maria Hill
            "MariaHillToken",
            # Nick Fury
            "NickFuryToken",
            # Ghost Rider
            "GhostRiderToken",
          }

          url = "https://marvel-snap-bgaona.onrender.com/v1/cards/"
          req = urllib.request.Request(url, headers={"User-Agent": "Mozilla/5.0"})

          raw = None
          for attempt in range(3):
              try:
                  print(f"Attempt {attempt + 1}...")
                  with urllib.request.urlopen(req, timeout=90) as r:
                      raw = json.loads(r.read().decode())
                  print(f"Success! Got {len(raw)} cards")
                  break
              except Exception as e:
                  print(f"Failed: {e}")
                  if attempt < 2:
                      print("Waiting 15s before retry...")
                      time.sleep(15)

          if not raw:
              raise Exception("All attempts failed")

          cards = []
          skipped = []
          for c in raw:
              name = c.get("cname", "")
              cid  = c.get("cid", "")
              if not name or not cid:
                  continue
              # Skip tokens
              if cid in TOKEN_IDS:
                  skipped.append(cid)
                  continue
              cards.append({
                  "cardDefId": cid,
                  "name":      name,
                  "cost":      int(c.get("cost", 0) or 0),
                  "power":     int(c.get("power", 0) or 0),
                  "ability":   c.get("ability") or "",
                  "image":     c.get("art") or ""
              })

          cards.sort(key=lambda x: (x["cost"], x["name"]))

          with open("cards.json", "w") as f:
              json.dump(cards, f, indent=2)

          print(f"Wrote {len(cards)} cards to cards.json")
          print(f"Skipped {len(skipped)} tokens: {skipped}")
          PYEOF

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cards.json
          git diff --staged --quiet || git commit -m "chore: update card data [skip ci]"
          git push
