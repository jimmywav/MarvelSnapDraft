name: Update Card Data

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 6am UTC
  push:
    branches: [main]
  workflow_dispatch:      # Allows manual trigger from GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch card data from API
        run: |
          echo "Fetching from MarvelSnapZone..."
          curl -v \
            "https://marvelsnapzone.com/api/?searchtype=cards&searchcardstype=all" \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
            -H "Accept: application/json" \
            -H "Referer: https://marvelsnapzone.com/" \
            -L \
            -o raw.json
          echo "--- raw.json first 500 chars ---"
          head -c 500 raw.json

      - name: Transform to cards.json
        run: |
          python3 << 'EOF'
          import json

          with open('raw.json') as f:
              content = f.read()

          print(f"raw.json size: {len(content)} bytes")
          print(f"First 200 chars: {content[:200]}")

          data = json.loads(content)

          if isinstance(data, list):
              raw = data
          else:
              raw = data.get('success', {}).get('cards', data.get('cards', []))

          print(f"Found {len(raw)} raw cards")

          cards = []
          for c in raw:
              name = c.get('name') or c.get('cname', '')
              cid  = c.get('cid', '') or c.get('cardDefId', '')
              if not name or not cid:
                  continue
              cards.append({
                  'cardDefId': cid,
                  'name':      name,
                  'cost':      int(c.get('cost', 0) or 0),
                  'power':     int(c.get('power', 0) or 0),
                  'ability':   c.get('ability') or c.get('description') or '',
                  'image':     c.get('url') or c.get('imageurl') or c.get('art') or ''
              })

          cards.sort(key=lambda x: (x['cost'], x['name']))

          with open('cards.json', 'w') as f:
              json.dump(cards, f, indent=2)

          print(f"Wrote {len(cards)} cards to cards.json")
          EOF

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cards.json
          git diff --staged --quiet || git commit -m "chore: update card data [skip ci]"
          git push
